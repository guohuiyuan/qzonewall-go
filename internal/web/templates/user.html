<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{{.Root}}/icon.png">
<title>投稿 - 表白墙</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f9ff; min-height: 100vh; }
  .navbar {
    background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    padding: 12px 20px;
    border: 1px solid #e0f2fe;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(56, 189, 248, 0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 14px auto 0;
    max-width: 920px;
  }
  .navbar h2 { color: #0f172a; font-size: 18px; letter-spacing: 0.2px; }
  .nav-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .user-chip {
    color: #475569;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 999px;
    padding: 4px 10px;
    font-weight: 600;
    font-size: 13px;
  }
  .nav-sep { color: #cbd5e1; font-size: 12px; }
  .navbar a {
    color: #334155;
    text-decoration: none;
    font-weight: 600;
    font-size: 13px;
    background: #ffffff;
    border: 1px solid #dbe5ef;
    border-radius: 8px;
    padding: 6px 12px;
    transition: all 0.2s ease;
  }
  .navbar a:hover { background: #e0f2fe; border-color: #7dd3fc; color: #0284c7; transform: translateY(-1px); }
  .navbar a:active { transform: translateY(0); }
  .container { max-width: 600px; margin: 24px auto; padding: 0 16px; }
  .card {
    background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
    padding: 28px;
    border-radius: 12px;
    border: 1px solid #e0f2fe;
    box-shadow: 0 6px 18px rgba(56, 189, 248, 0.08);
  }
  .form-group { margin-bottom: 18px; }
  label { display: block; margin-bottom: 6px; font-weight: 600; color: #334155; font-size: 14px; }
  input[type="text"], textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s ease;
    background: #ffffff;
    color: #0f172a;
  }
  input:focus, textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
  textarea { min-height: 140px; resize: vertical; font-family: inherit; }
  .checkbox-group { display: flex; align-items: center; gap: 8px; }
  .checkbox-group input { width: 16px; height: 16px; accent-color: #f59e0b; cursor: pointer; }
  .checkbox-group label { margin: 0; font-weight: normal; }
  .file-label {
    display: inline-block;
    padding: 8px 16px;
    background: #ffffff;
    border: 1px solid #bae6fd;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #0ea5e9;
    transition: all 0.2s ease;
    font-weight: 600;
  }
  .file-label:hover { background: #e0f2fe; border-color: #7dd3fc; color: #0284c7; transform: translateY(-1px); }
  .file-label input { display: none; }
  .preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .preview img { width: 86px; height: 86px; object-fit: cover; border-radius: 10px; border: 1px solid #e5e7eb; box-shadow: 0 3px 10px rgba(15, 23, 42, 0.08); }
  button.submit {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
  }
  button.submit:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(59, 130, 246, 0.3); }
  button.submit:active { transform: translateY(0); }
  button.submit:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .msg.ok { background: #f0fdf4; color: #166534; }
  .msg.err { background: #fff5f5; color: #c53030; }

  /* [新增] Qzone 链接/状态样式 */
  .wall-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    margin-right: auto; /* 在 flex 布局中推到左侧或中间 */
    margin-left: 12px;
    transition: all 0.2s ease;
  }
  
  /* 在线状态：绿色，可点击 */
  .wall-badge.online {
    background: #ecfdf5;
    color: #059669;
    border: 1px solid #a7f3d0;
  }
  .wall-badge.online:hover {
    background: #d1fae5;
    transform: translateY(-1px);
    box-shadow: 0 2px 6px rgba(16, 185, 129, 0.15);
  }

  /* 离线状态：灰色/红色，不可点击 */
  .wall-badge.offline {
    background: #f1f5f9;
    color: #64748b;
    border: 1px solid #e2e8f0;
    cursor: default;
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.green { background: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
  .dot.gray { background: #94a3b8; }

  @media (max-width: 640px) {
    /* 移动端调整 */
    .wall-badge {
      order: 3; /* 让它排在最后或换行 */
      width: 100%;
      justify-content: center;
      margin: 8px 0 0 0;
    }
  }
</style>
</head>
<body>
<div class="navbar">
  <div style="display:flex;align-items:center">
    <h2>💌 表白墙投稿</h2>
    
    <span id="wallStatus">
      {{if .QzoneOnline}}
        <a href="https://user.qzone.qq.com/{{.QzoneUIN}}" target="_blank" class="wall-badge online" title="点击访问表白墙">
          <span class="dot green"></span>
          进墙看看
        </a>
      {{else}}
        <span class="wall-badge offline" title="管理员暂未登录">
          <span class="dot gray"></span>
          墙休息中
        </span>
      {{end}}
    </span>
  </div>

  <div class="nav-actions">
    {{if .IsAdmin}}
      <span class="user-chip">{{.Account.Username}}</span><span class="nav-sep">|</span><a href="{{.Root}}/admin">管理后台</a><span class="nav-sep">|</span><a href="{{.Root}}/logout">退出</a>
    {{else}}
      <a href="{{.Root}}/login">管理员登录</a>
    {{end}}
  </div>
</div>
<div class="container">
  {{if .Message}}<div class="msg ok">{{.Message}}</div>{{end}}
  <div class="card">
    <form id="submitForm" method="POST" action="{{.Root}}/api/submit" enctype="multipart/form-data">
      <div class="form-group">
        <label>QQ号</label>
        <input type="text" name="uin" placeholder="输入QQ号">
      </div>
      <div class="form-group">
        <label>内容 *</label>
        <textarea name="text" placeholder="写下你想说的话..." required></textarea>
      </div>
      <div class="form-group">
        <label>图片（最多 {{.MaxImages}} 张）</label>
        <label class="file-label">
          📷 选择图片
          <input type="file" name="images" accept="image/*" multiple id="imageInput">
        </label>
        <div class="preview" id="preview"></div>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" name="anon" id="anon">
        <label for="anon">匿名投稿</label>
      </div>
      <button type="submit" class="submit" id="submitBtn">提交投稿</button>
    </form>
    <div id="result" class="msg" style="display:none;margin-top:16px"></div>
  </div>
</div>
<script>
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');
imageInput.addEventListener('change', function() {
  preview.innerHTML = '';
  for (const file of this.files) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    preview.appendChild(img);
  }
});

document.getElementById('submitForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const result = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = '提交中...';
  try {
    const resp = await fetch('{{.Root}}/api/submit', { method: 'POST', body: new FormData(this) });
    const data = await resp.json();
    result.style.display = 'block';
    result.className = 'msg ' + (data.ok ? 'ok' : 'err');
    result.textContent = data.message;
    if (data.ok) { this.reset(); preview.innerHTML = ''; }
  } catch(err) {
    result.style.display = 'block';
    result.className = 'msg err';
    result.textContent = '提交失败: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '提交投稿';
  }
});

async function refreshWallStatus() {
  const container = document.getElementById('wallStatus');
  if (!container) return;
  try {
    const resp = await fetch('{{.Root}}/api/qzone/status', { cache: 'no-store' });
    if (!resp.ok) return;
    const data = await resp.json();
    if (!data || !data.ok) return;
    
    // 如果返回状态是在线
    if (data.cookie_valid) {
      // 检查当前是否已经是在线状态 (避免重复渲染导致闪烁)
      if (container.querySelector('.wall-badge.online')) return;
      container.innerHTML = `
        <a href="https://user.qzone.qq.com/${data.uin}" target="_blank" class="wall-badge online" title="点击访问表白墙">
          <span class="dot green"></span>
          进墙看看
        </a>`;
    } else {
      // 离线状态
      if (container.querySelector('.wall-badge.offline')) return;
      container.innerHTML = `
        <span class="wall-badge offline" title="管理员暂未登录">
          <span class="dot gray"></span>
          墙休息中
        </span>`;
    }
  } catch (e) {}
}

// 每 5 秒刷新一次状态
setInterval(refreshWallStatus, 5000);
</script>
</body>
</html>
